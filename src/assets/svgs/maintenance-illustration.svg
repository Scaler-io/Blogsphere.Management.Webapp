<svg viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gearBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0076ff"/>
      <stop offset="100%" stop-color="#0033cc"/>
    </linearGradient>
    <linearGradient id="gearLightBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4d88ff"/>
      <stop offset="100%" stop-color="#1a66ff"/>
    </linearGradient>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdd9b5"/>
      <stop offset="100%" stop-color="#f5c69a"/>
    </linearGradient>
    <linearGradient id="yellowAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe600"/>
      <stop offset="100%" stop-color="#ffca28"/>
    </linearGradient>
  </defs>

  <!-- Ground line -->
  <ellipse cx="250" cy="365" rx="210" ry="12" fill="#e6eeff" opacity="0.6"/>

  <!-- ============================== -->
  <!-- LARGE COG - center, clockwise  -->
  <!-- ============================== -->
  <g>
    <g>
      <!-- Gear body with proper teeth -->
      <circle cx="250" cy="200" r="60" fill="url(#gearBlue)"/>
      <rect x="240" y="132" width="20" height="20" rx="3" fill="url(#gearBlue)"/>
      <rect x="240" y="248" width="20" height="20" rx="3" fill="url(#gearBlue)"/>
      <rect x="182" y="190" width="20" height="20" rx="3" fill="url(#gearBlue)"/>
      <rect x="298" y="190" width="20" height="20" rx="3" fill="url(#gearBlue)"/>
      <rect x="196" y="147" width="18" height="18" rx="3" fill="url(#gearBlue)" transform="rotate(45 205 156)"/>
      <rect x="286" y="147" width="18" height="18" rx="3" fill="url(#gearBlue)" transform="rotate(45 295 156)"/>
      <rect x="196" y="235" width="18" height="18" rx="3" fill="url(#gearBlue)" transform="rotate(45 205 244)"/>
      <rect x="286" y="235" width="18" height="18" rx="3" fill="url(#gearBlue)" transform="rotate(45 295 244)"/>
      <!-- Inner rings -->
      <circle cx="250" cy="200" r="42" fill="white"/>
      <circle cx="250" cy="200" r="30" fill="url(#gearLightBlue)"/>
      <circle cx="250" cy="200" r="14" fill="white"/>
      <!-- Small holes -->
      <circle cx="250" cy="180" r="4" fill="white" opacity="0.5"/>
      <circle cx="250" cy="220" r="4" fill="white" opacity="0.5"/>
      <circle cx="230" cy="200" r="4" fill="white" opacity="0.5"/>
      <circle cx="270" cy="200" r="4" fill="white" opacity="0.5"/>
      <animateTransform attributeName="transform" type="rotate" from="0 250 200" to="360 250 200" dur="15s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ============================== -->
  <!-- SMALL COG - top right, counter -->
  <!-- ============================== -->
  <g>
    <g>
      <circle cx="340" cy="120" r="32" fill="url(#gearLightBlue)"/>
      <rect x="332" y="84" width="16" height="12" rx="2" fill="url(#gearLightBlue)"/>
      <rect x="332" y="144" width="16" height="12" rx="2" fill="url(#gearLightBlue)"/>
      <rect x="304" y="112" width="12" height="16" rx="2" fill="url(#gearLightBlue)"/>
      <rect x="364" y="112" width="12" height="16" rx="2" fill="url(#gearLightBlue)"/>
      <rect x="312" y="92" width="12" height="12" rx="2" fill="url(#gearLightBlue)" transform="rotate(45 318 98)"/>
      <rect x="356" y="92" width="12" height="12" rx="2" fill="url(#gearLightBlue)" transform="rotate(45 362 98)"/>
      <rect x="312" y="136" width="12" height="12" rx="2" fill="url(#gearLightBlue)" transform="rotate(45 318 142)"/>
      <rect x="356" y="136" width="12" height="12" rx="2" fill="url(#gearLightBlue)" transform="rotate(45 362 142)"/>
      <circle cx="340" cy="120" r="20" fill="white"/>
      <circle cx="340" cy="120" r="12" fill="url(#gearBlue)"/>
      <circle cx="340" cy="120" r="5" fill="white"/>
      <animateTransform attributeName="transform" type="rotate" from="360 340 120" to="0 340 120" dur="10s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ============================== -->
  <!-- TINY COG - left, clockwise     -->
  <!-- ============================== -->
  <g>
    <g>
      <circle cx="145" cy="170" r="22" fill="url(#gearLightBlue)"/>
      <rect x="139" y="144" width="12" height="10" rx="2" fill="url(#gearLightBlue)"/>
      <rect x="139" y="186" width="12" height="10" rx="2" fill="url(#gearLightBlue)"/>
      <rect x="119" y="164" width="10" height="12" rx="2" fill="url(#gearLightBlue)"/>
      <rect x="161" y="164" width="10" height="12" rx="2" fill="url(#gearLightBlue)"/>
      <rect x="126" y="150" width="10" height="10" rx="2" fill="url(#gearLightBlue)" transform="rotate(45 131 155)"/>
      <rect x="154" y="150" width="10" height="10" rx="2" fill="url(#gearLightBlue)" transform="rotate(45 159 155)"/>
      <rect x="126" y="180" width="10" height="10" rx="2" fill="url(#gearLightBlue)" transform="rotate(45 131 185)"/>
      <rect x="154" y="180" width="10" height="10" rx="2" fill="url(#gearLightBlue)" transform="rotate(45 159 185)"/>
      <circle cx="145" cy="170" r="12" fill="white"/>
      <circle cx="145" cy="170" r="7" fill="url(#gearBlue)"/>
      <circle cx="145" cy="170" r="3" fill="white"/>
      <animateTransform attributeName="transform" type="rotate" from="0 145 170" to="360 145 170" dur="7s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ====================================================== -->
  <!-- PERSON 1: Left - Woman with laptop, sitting on floor   -->
  <!-- ====================================================== -->
  <g transform="translate(60, 250)">
    <!-- Hair -->
    <ellipse cx="0" cy="-58" rx="14" ry="15" fill="#00205b"/>
    <!-- Head -->
    <circle cx="0" cy="-52" r="12" fill="url(#skinTone)"/>
    <!-- Body / torso -->
    <path d="M-12 -40 L-14 -10 L14 -10 L12 -40 Z" fill="#0033cc" rx="3"/>
    <!-- Arms -->
    <path d="M-14 -35 Q-28 -25 -22 -10" stroke="#0033cc" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M14 -35 Q28 -25 22 -10" stroke="#0033cc" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Hands -->
    <circle cx="-22" cy="-8" r="4" fill="url(#skinTone)"/>
    <circle cx="22" cy="-8" r="4" fill="url(#skinTone)"/>
    <!-- Laptop -->
    <rect x="-18" y="-14" width="36" height="5" rx="2" fill="#616161"/>
    <rect x="-16" y="-26" width="32" height="14" rx="2" fill="#424242"/>
    <rect x="-13" y="-24" width="26" height="10" rx="1" fill="#4d88ff" opacity="0.6"/>
    <!-- Legs -->
    <path d="M-8 -10 L-16 20 L-10 22 L-2 0" fill="#00205b"/>
    <path d="M8 -10 L16 20 L10 22 L2 0" fill="#00205b"/>
    <!-- Shoes -->
    <ellipse cx="-14" cy="23" rx="7" ry="4" fill="#0033cc"/>
    <ellipse cx="14" cy="23" rx="7" ry="4" fill="#0033cc"/>
  </g>

  <!-- ================================================ -->
  <!-- PERSON 2: Right - Man standing with wrench       -->
  <!-- ================================================ -->
  <g transform="translate(420, 220)">
    <!-- Hard hat -->
    <path d="M-14 -72 L14 -72 L16 -62 L-16 -62 Z" fill="url(#yellowAccent)"/>
    <rect x="-18" y="-64" width="36" height="5" rx="2" fill="url(#yellowAccent)"/>
    <!-- Head -->
    <circle cx="0" cy="-52" r="13" fill="url(#skinTone)"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-54" r="1.5" fill="#00205b"/>
    <circle cx="4" cy="-54" r="1.5" fill="#00205b"/>
    <!-- Smile -->
    <path d="M-4 -48 Q0 -45 4 -48" stroke="#00205b" stroke-width="1.2" fill="none"/>
    <!-- Body -->
    <path d="M-14 -38 L-16 30 L16 30 L14 -38 Z" fill="#0033cc"/>
    <!-- Belt -->
    <rect x="-16" y="5" width="32" height="5" rx="1" fill="url(#yellowAccent)"/>
    <!-- Left arm holding wrench up -->
    <path d="M-14 -30 Q-32 -35 -30 -55" stroke="#0033cc" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="-30" cy="-55" r="4" fill="url(#skinTone)"/>
    <!-- Wrench -->
    <rect x="-33" y="-85" width="6" height="32" rx="2" fill="#9e9e9e"/>
    <path d="M-37 -88 L-23 -88 L-25 -82 L-35 -82 Z" fill="#757575"/>
    <!-- Right arm on hip -->
    <path d="M14 -30 Q28 -15 22 10" stroke="#0033cc" stroke-width="7" stroke-linecap="round" fill="none"/>
    <circle cx="22" cy="12" r="4" fill="url(#skinTone)"/>
    <!-- Legs -->
    <rect x="-12" y="30" width="10" height="38" rx="3" fill="#00205b"/>
    <rect x="2" y="30" width="10" height="38" rx="3" fill="#00205b"/>
    <!-- Boots -->
    <path d="M-14 66 L-14 72 L2 72 L2 66 Z" rx="2" fill="#424242"/>
    <path d="M0" y="66" fill="#424242"/>
    <rect x="0" y="66" width="16" height="6" rx="2" fill="#424242"/>
  </g>

  <!-- ================================================ -->
  <!-- PERSON 3: Center bottom - kneeling, fixing gear  -->
  <!-- ================================================ -->
  <g transform="translate(240, 310)">
    <!-- Hard hat -->
    <path d="M-12 -62 L12 -62 L14 -54 L-14 -54 Z" fill="url(#yellowAccent)"/>
    <rect x="-15" y="-56" width="30" height="4" rx="2" fill="url(#yellowAccent)"/>
    <!-- Head -->
    <circle cx="0" cy="-44" r="11" fill="url(#skinTone)"/>
    <!-- Eyes -->
    <circle cx="-3" cy="-46" r="1.5" fill="#00205b"/>
    <circle cx="3" cy="-46" r="1.5" fill="#00205b"/>
    <!-- Body, kneeling pose -->
    <path d="M-12 -32 L-14 10 L14 10 L12 -32 Z" fill="#0033cc"/>
    <!-- Left arm reaching toward gear -->
    <path d="M-12 -24 Q-35 -30 -40 -40" stroke="#0033cc" stroke-width="6" stroke-linecap="round" fill="none"/>
    <circle cx="-40" cy="-42" r="4" fill="url(#skinTone)"/>
    <!-- Screwdriver in hand -->
    <rect x="-43" y="-62" width="4" height="22" rx="1" fill="#9e9e9e"/>
    <rect x="-45" y="-65" width="8" height="6" rx="2" fill="url(#yellowAccent)"/>
    <!-- Right arm down -->
    <path d="M12 -24 Q22 -10 18 10" stroke="#0033cc" stroke-width="6" stroke-linecap="round" fill="none"/>
    <circle cx="18" cy="12" r="4" fill="url(#skinTone)"/>
    <!-- Kneeling legs -->
    <path d="M-8 10 L-18 30 L-8 32 L0 15" fill="#00205b"/>
    <path d="M8 10 L18 20 L22 18 L12 8" fill="#00205b"/>
    <!-- Knee pad -->
    <ellipse cx="-14" cy="32" rx="6" ry="4" fill="#424242"/>
    <ellipse cx="20" cy="20" rx="5" ry="4" fill="#424242"/>
  </g>

  <!-- Floating sparkles / progress dots -->
  <circle cx="310" cy="65" r="3" fill="#ffe600">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="130" r="2.5" fill="#0076ff">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="175" r="2" fill="#ffe600">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="290" r="2.5" fill="#0076ff">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
</svg>
