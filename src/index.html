<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Blogsphere - Management UI</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="assets/svgs/blogsphere.logo.svg" />
    <!-- Same-origin as bundled styles.css; crossorigin required for font preload. -->
    <link rel="preload" href="material-symbols-rounded.woff2" as="font" type="font/woff2" crossorigin />

  </head>
  <body class="mat-typography">
    <blogsphere-root></blogsphere-root>
  </body>
</html>
