<div class="dialog-shell">
  <div class="dialog-shell__header">
    <div class="dialog-shell__heading">
      <h2 mat-dialog-title class="dialog-title">Create API Product</h2>
      <p class="dialog-subtitle">Create a new API product to manage your API endpoints.</p>
    </div>
    <blogsphere-icon-button
      icon="close"
      ariaLabel="Close dialog"
      variant="ghost"
      size="sm"
      tone="on-surface"
      (next)="closeDialog()"
    ></blogsphere-icon-button>
  </div>

  <div mat-dialog-content class="dialog-shell__body stack-md">
    <form [formGroup]="apiProductFormGroup" class="stack-md">
      <mat-form-field class="w-100">
        <mat-label>Product name</mat-label>
        <input matInput type="text" formControlName="productName" />
        <mat-error>{{ getErrorMessage('productName') }}</mat-error>
      </mat-form-field>

      <mat-form-field class="w-100">
        <mat-label>Product description</mat-label>
        <textarea
          matInput
          type="text"
          rows="8"
          formControlName="productDescription"
        ></textarea>
        <mat-error>{{ getErrorMessage('productDescription') }}</mat-error>
      </mat-form-field>
    </form>
  </div>

  <div mat-dialog-actions class="dialog-shell__actions" align="end">
    <blogsphere-button
      [isLoading]="isCreating$ | async"
      [type]="ButtonType.primary"
      [size]="ButtonSize.small"
      (next)="onCreateApiProduct()"
    >
      Create
    </blogsphere-button>
  </div>
</div>
