<div
  class="sidenav-backdrop"
  [class.sidenav-backdrop--show]="isMobileView && isSidenavExpanded"
  (click)="handleBackdropClick()"
></div>

<aside
  class="sidenav"
  [class.sidenav--collapsed]="!isMobileView && !isSidenavExpanded"
  [class.sidenav--mobile-open]="isMobileView && isSidenavExpanded"
  [attr.aria-label]="'Primary navigation'"
>
  <nav class="sidenav__nav">
    <div class="sidenav__list" role="list">
      <blogsphere-sidebar-nav-link
        link="/dashboard"
        icon="dashboard"
        label="Dashboard"
        [collapsed]="isCollapsedRail"
        (navigate)="handleSidenavItemClick()"
      />
      @if (canAccessSystemSettings$ | async) {
        <blogsphere-sidebar-nav-link
          link="/subscription"
          icon="subscriptions"
          label="Subscription manager"
          [collapsed]="isCollapsedRail"
          (navigate)="handleSidenavItemClick()"
        />
        <blogsphere-sidebar-expandable-nav-item
          [expanded]="subMenuList.apiManager"
          [collapsed]="isCollapsedRail"
          [submenuItems]="apiManagerSubmenuItems"
          [label]="'Api manager'"
          headerIcon="api"
          (headerClick)="handleSidenavItemClick('apiManager')"
          (submenuNavigate)="hadndleSubmenuClick()"
        />
      }
      @if (canAccessUserManagement$ | async) {
        <blogsphere-sidebar-expandable-nav-item
          [expanded]="subMenuList.userManagement"
          [collapsed]="isCollapsedRail"
          [submenuItems]="userManagementSubmenuItems"
          [label]="'User manager'"
          headerIcon="people"
          (headerClick)="handleSidenavItemClick('userManagement')"
          (submenuNavigate)="hadndleSubmenuClick()"
        />
      }
    </div>
  </nav>
</aside>
