<a
  class="sidebar-submenu-link"
  matRipple
  [routerLink]="link"
  [routerLinkActive]="'sidebar-submenu-link--active'"
  (click)="navigate.emit()"
  role="listitem"
>
  <span class="material-symbols-rounded sidebar-submenu-link__icon" aria-hidden="true">{{ icon }}</span>
  <span class="sidebar-submenu-link__label">{{ label }}</span>
</a>
