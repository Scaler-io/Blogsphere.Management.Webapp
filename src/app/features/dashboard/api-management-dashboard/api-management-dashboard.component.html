<section class="api-dashboard">
  <div class="api-dashboard__grid api-dashboard__grid--hero">
    <blogsphere-metric-card
      class="api-dashboard__metric"
      label="API CLUSTERS"
      [value]="totalClusters"
      valueFormat="number"
      icon="hub"
      accent="left"
      accentTone="primary"
      subtext="Clusters configured in the gateway"
    >
      <a class="api-dashboard__metric-link" (click)="navigateToClusters()">View clusters →</a>
    </blogsphere-metric-card>

    <blogsphere-metric-card
      class="api-dashboard__metric"
      label="API ROUTES"
      [value]="totalRoutes"
      valueFormat="number"
      icon="route"
      accent="left"
      accentTone="secondary"
      subtext="Routes configured in the gateway"
    >
      <a class="api-dashboard__metric-link" (click)="navigateToRoutes()">View routes →</a>
    </blogsphere-metric-card>

    <blogsphere-metric-card
      class="api-dashboard__metric"
      label="API PRODUCTS"
      [value]="totalProducts"
      valueFormat="number"
      icon="subscriptions"
      accent="left"
      accentTone="success"
      subtext="Products available for subscription"
    >
      <a class="api-dashboard__metric-link" (click)="navigateToSubscription()">View subscription manager →</a>
    </blogsphere-metric-card>
  </div>

  <div class="api-dashboard__grid api-dashboard__grid--actions">
    <h2 class="api-dashboard__section-title">Quick actions</h2>
    <div class="api-dashboard__actions">
      <blogsphere-quick-action-tile
        icon="hub"
        label="Manage clusters"
        description="Provision, edit, and decommission API gateway clusters"
        iconBackground="primary-fixed"
        (next)="navigateToClusters()"
      />
      <blogsphere-quick-action-tile
        icon="route"
        label="Configure routes"
        description="Define routing rules and policies for the gateway"
        iconBackground="secondary-fixed"
        (next)="navigateToRoutes()"
      />
      <blogsphere-quick-action-tile
        icon="subscriptions"
        label="Manage subscriptions"
        description="Review API product subscriptions and access policies"
        iconBackground="tertiary-tonal"
        (next)="navigateToSubscription()"
      />
    </div>
  </div>

  <blogsphere-chart-card
    class="api-dashboard__chart--wide"
    eyebrow="PERFORMANCE"
    title="Growth trend"
    tone="secondary"
    [loading]="!chartsDataLoaded"
    bodyHeight="320px"
  >
    <blogsphere-segmented-control
      toolbar
      [options]="growthChartRangeOptions"
      [value]="growthChartRange"
      size="sm"
      tone="secondary"
      ariaLabel="Growth chart time range"
      (valueChange)="onGrowthRangeChange($event)"
    />
    <canvas
      baseChart
      [data]="growthChartData"
      [options]="growthChartOptions"
      [type]="lineChartType"
    ></canvas>
  </blogsphere-chart-card>

  <div class="api-dashboard__grid api-dashboard__grid--charts">
    <blogsphere-chart-card
      eyebrow="DISTRIBUTION"
      title="Cluster status"
      tone="secondary"
      [loading]="!chartsDataLoaded"
      bodyHeight="280px"
      bodyMaxWidth="360px"
    >
      <canvas
        baseChart
        [data]="statusChartData"
        [options]="statusChartOptions"
        [type]="doughnutChartType"
      ></canvas>
    </blogsphere-chart-card>

    <blogsphere-chart-card
      eyebrow="ACTIVITY"
      title="Monthly route activity"
      tone="secondary"
      [loading]="!chartsDataLoaded"
      bodyHeight="280px"
    >
      <canvas
        baseChart
        [data]="activityChartData"
        [options]="activityChartOptions"
        [type]="barChartType"
      ></canvas>
    </blogsphere-chart-card>
  </div>
</section>
