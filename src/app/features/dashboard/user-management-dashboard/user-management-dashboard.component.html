<section class="users-dashboard">
  <div class="users-dashboard__grid users-dashboard__grid--metrics">
    <blogsphere-metric-card
      label="TOTAL USERS"
      [value]="totalUsers"
      valueFormat="number"
      icon="group"
      accent="left"
      accentTone="primary"
      subtext="Accounts in the directory index"
    />

    <blogsphere-metric-card
      label="ACTIVE USERS"
      [value]="activeUsers"
      valueFormat="number"
      icon="verified_user"
      accent="left"
      accentTone="success"
      [subtext]="activeRatioCaption"
    />

    <blogsphere-metric-card
      label="INACTIVE USERS"
      [value]="inactiveUsers"
      valueFormat="number"
      icon="person_off"
      accent="left"
      accentTone="error"
      subtext="Users marked inactive"
    />

    <blogsphere-metric-card
      label="NEW · LAST 30 DAYS"
      [value]="newUsersLast30Days"
      valueFormat="number"
      icon="person_add"
      accent="left"
      accentTone="secondary"
      [delta]="newUsersDelta"
      subtext="vs prior 30-day baseline"
    />
  </div>

  <blogsphere-chart-card
    class="users-dashboard__chart--wide"
    eyebrow="PERFORMANCE"
    title="Account growth (cumulative)"
    tone="secondary"
    [loading]="!chartsDataLoaded"
    bodyHeight="320px"
  >
    <canvas
      baseChart
      [data]="growthChartData"
      [options]="growthChartOptions"
      [type]="lineChartType"
    ></canvas>
  </blogsphere-chart-card>

  <div class="users-dashboard__grid users-dashboard__grid--two-up">
    <blogsphere-chart-card
      eyebrow="REGISTRATIONS"
      title="Monthly registrations"
      tone="secondary"
      [loading]="!chartsDataLoaded"
      bodyHeight="280px"
    >
      <canvas
        baseChart
        [data]="monthlyChartData"
        [options]="monthlyChartOptions"
        [type]="barChartType"
      ></canvas>
    </blogsphere-chart-card>

    <blogsphere-chart-card
      eyebrow="DISTRIBUTION"
      title="Status distribution"
      tone="secondary"
      [loading]="!chartsDataLoaded"
      bodyHeight="280px"
      bodyMaxWidth="360px"
    >
      <canvas
        baseChart
        [data]="statusChartData"
        [options]="statusChartOptions"
        [type]="doughnutChartType"
      ></canvas>
    </blogsphere-chart-card>
  </div>

  <div class="users-dashboard__grid users-dashboard__grid--two-up">
    <blogsphere-chart-card
      eyebrow="SEGMENTS"
      title="Top departments"
      tone="secondary"
      [loading]="!chartsDataLoaded"
      bodyHeight="280px"
    >
      <canvas
        baseChart
        [data]="topDepartmentsChartData"
        [options]="topDepartmentsChartOptions"
        [type]="barChartType"
      ></canvas>
    </blogsphere-chart-card>

    <blogsphere-chart-card
      eyebrow="ROLES"
      title="Top roles"
      tone="secondary"
      [loading]="!chartsDataLoaded"
      bodyHeight="280px"
    >
      <canvas
        baseChart
        [data]="topRolesChartData"
        [options]="topRolesChartOptions"
        [type]="barChartType"
      ></canvas>
    </blogsphere-chart-card>
  </div>
</section>
