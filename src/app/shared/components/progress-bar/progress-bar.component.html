<div class="progress-bar" [ngClass]="hostClasses">
  <div *ngIf="label || resolvedValueLabel" class="progress-bar__header">
    <span *ngIf="label" class="progress-bar__label">{{ label }}</span>
    <span *ngIf="resolvedValueLabel" class="progress-bar__value">{{ resolvedValueLabel }}</span>
  </div>

  <div
    class="progress-bar__track"
    role="progressbar"
    [attr.aria-label]="label || null"
    [attr.aria-valuenow]="indeterminate ? null : clampedValue"
    [attr.aria-valuemin]="indeterminate ? null : 0"
    [attr.aria-valuemax]="indeterminate ? null : max"
  >
    <div class="progress-bar__fill" [style.width.%]="indeterminate ? null : percentage"></div>
  </div>

  <p *ngIf="caption" class="progress-bar__caption">{{ caption }}</p>
</div>
