@if (!isSuccessPage && !isGenericErrorPage && !isMaintenancePage) {
  <header class="page-header">
    <div class="page-header__title">
      <span class="page-header__icon-tile" aria-hidden="true">
        <span class="material-symbols-rounded">{{ pageIcon }}</span>
      </span>
      @if (!isBusy) {
        <h1 class="page-header__title-text">{{ pageName }}</h1>
      }
    </div>

    <div class="page-header__breadcrumb">
      <xng-breadcrumb></xng-breadcrumb>
    </div>
  </header>
}
